; PlatformIO Project Configuration File for Cloud Lamp ESP32-C3
;
; Board: Seeed Studio XIAO ESP32-C3
; Framework: Arduino
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:seeed_xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino

; Serial Monitor settings
monitor_speed = 115200
monitor_filters = default
; monitor_port = COM9

; Upload settings
upload_speed = 921600
; upload_port = COM9

; Build flags
build_flags = 
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D LED_COUNT=40
    -D SEGMENT_SIZE=10
    ; Uncomment the line below to enable demo mode for LED testing
    ; -D DEMO_MODE

; Library dependencies
lib_deps = 
    ; FastLED for SK6812 RGBW control
    fastled/FastLED@^3.6.0
    ; ArduinoJson for JSON parsing
    bblanchon/ArduinoJson@^7.0.0

; ============================================================================
; Demo Environment - For LED Connection Testing
; ============================================================================
; Use this environment to run demo mode patterns
; Switch environment in PlatformIO: Click env selector in bottom bar
; Or build with: pio run -e demo

[env:demo]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino

monitor_speed = 115200
monitor_filters = default
upload_speed = 921600

; Enable demo mode with single LED for debugging
build_flags = 
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D LED_COUNT=40
    -D SEGMENT_SIZE=10
    -D DEMO_MODE

lib_deps = 
    fastled/FastLED@^3.6.0
    bblanchon/ArduinoJson@^7.0.0
